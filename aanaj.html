

<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabji Jode</title>

  <link rel="stylesheet" href="style.css">
  <style> 
    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  display:flex;
  justify-content:center;
  align-items:flex-start;
max-height:100vh;
  background: radial-gradient(circle at 20% 20%, #00f5a033, transparent),
              radial-gradient(circle at 80% 30%, #00d9ff33, transparent),
              radial-gradient(circle at 50% 80%, #00f5a022, transparent),
              #0f172a;

  color:white;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:420px;
  padding:20px;
 
  display:flex;
  flex-direction:column;
  gap:15px;
  height:auto;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:25px;
  min-height: 100vh;
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

/* TOP */
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.back-btn{
  background:rgba(255,255,255,0.1);
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
}

/* TOGGLE */
.lang-toggle{
  width:90px;
  height:45px;
  border-radius:30px;
  padding:5px;
  display:flex;
  align-items:center;
  position:relative;

  background:rgba(255,255,255,0.1);
}

.circle{
  width:35px;
  height:35px;
  border-radius:50%;
  background:linear-gradient(45deg,#00f5a0,#00d9ff);
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-weight:bold;
}

.label{
  position:absolute;
  right:10px;
}

/* HEADING */
.heading{
  text-align:center;
}



/* VEG LIST */
.label-text{
  margin-top:10px;
}

.fasal-list{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}

.fasal{
  width:65px;
  height:65px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  display:flex;
  justify-content:center;
  align-items:center;
  border:2px solid transparent;
  cursor:pointer;
  transition:0.3s;
}

.fasal img{
  width:60px;
 
}

.fasal.active{
  border:2px solid #00f5a0;
  box-shadow:0 0 10px #00f5a0;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border-radius:20px;
  border:none;
  background:rgba(255,255,255,0.1);
 
}
.input::placeholder{
    color:white;
    opacity :1;
}

/* SLIDER BOX */
.slider-box{
  background:rgba(255,255,255,0.08);
  padding:15px;
  border-radius:20px;
}

.slider-box label{
  display:flex;
  justify-content:space-between;
  margin-bottom:5px;
}

input[type="range"]{
  width:100%;
}

/* HOVER EFFECT */
.fasal:hover{
  transform:scale(1.1);
}

.save-btn{
  width:100%;
  padding:15px;
  margin-top:20px;

  border:none;
  border-radius:30px;

  font-size:16px;
  font-weight:600;

  color:white;

  background:linear-gradient(45deg,#00f5a0,#00d9ff);

  box-shadow:0 5px 0 #008f6a,
             0 0 20px #00f5a0;

  cursor:pointer;
  transition:0.3s;
}

/* 🔥 Hover Effect */
.save-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 0 #008f6a,
             0 0 30px #00f5a0;
}

/* 🔥 Click Effect */
.save-btn:active{
  transform:translateY(2px);
  box-shadow:0 2px 0 #008f6a;
}
  </style>
</head>

<body>

<div class="container">

  <!-- TOP -->
  <div class="top-bar">
    <div class="back-btn" onclick="window.location.href='agrohelp.html'">← रोल बदलें</div>

    <div class="lang-toggle" onclick="toggleLang()">
      <div id="circle" class="circle">En</div>
      
    </div>
  </div>

  <!-- BACK -->
  <div class="back" onclick="window.location.href='shoppage.html'">← पीछे</div>

  <!-- TITLE -->
  <h1>फ़सल जोड़ें</h1>

  <div class="fasal-list">

<div class="fasal active">
  <img src="https://pngimg.com/uploads/wheat/wheat_PNG75.png" alt="Gehu">
</div>

<div class="fasal">
  <img src="https://pngimg.com/uploads/rice/rice_PNG17.png" alt="Chawal">
</div>

<div class="fasal">
  <img src="https://pngimg.com/uploads/corn/corn_PNG5271.png" alt="Makka">
</div>

<div class="fasal">
  <img src="https://pngimg.com/uploads/soybean/soybean_PNG13.png" alt="Soyabin">
</div>
<div class="fasal">
  <img src="https://pngimg.com/uploads/rice/rice_PNG40.png" alt="Dhan">
</div>
  </div>

  <!-- INPUTS -->
  
  <input type="text" placeholder="नाम (English)">

  <!-- PRICE -->
  <div class="slider-box">
    <label>दाम / किलो <span>₹25</span></label>
    <input type="range" min="1" max="100" value="25">
  </div>

  <!-- QTY -->
  <div class="slider-box">
    <label>मात्रा (किलो) <span>20</span></label>
    <input type="range" min="1" max="100" value="20">
  </div>
<button class="save-btn" onclick="savefasal()">✔ हो गया</button>
</div>
<script src="script.js"></script>
</body>
<script>
  let currentLang = "hi";

/* TEXT */
const text = {
  hi:{
    title:"फ़सल जोड़ें",
    nameHi:"नाम (हिंदी)",
    nameEn:"नाम (English)",
    price:"दाम / किलो",
    qty:"मात्रा (किलो)",
    back:"← पीछे",
    role:"← रोल बदलें"
  },
  en:{
    title:"Add Crop",
    nameHi:"Name (Hindi)",
    nameEn:"Name (English)",
    price:"Price / kg",
    qty:"Quantity (kg)",
    back:"← Back",
    role:"← Change Role"
  }
};

/*fasal CLICK (GLOW) */
const fasals = document.querySelectorAll(".fasal");

fasals.forEach(fasal=>{
  fasal.addEventListener("click", ()=>{
    fasals.forEach(f => f.classList.remove("active"));
    fasal.classList.add("active");
  });
});

/* 🎚 SLIDER VALUE UPDATE */
const sliders = document.querySelectorAll("input[type='range']");
const labels = document.querySelectorAll(".slider-box label span");

sliders.forEach((slider,index)=>{
  slider.addEventListener("input", ()=>{
    if(index === 0){
      labels[index].innerText = "₹" + slider.value;
    }else{
      labels[index].innerText = slider.value;
    }
  });
});

/*  LANGUAGE APPLY */
function applyLanguage(lang){

  currentLang = lang;

  // title
  document.querySelector("h1").innerText = text[lang].title;

  // inputs
  const inputs = document.querySelectorAll("input[type='text']");
  
  inputs[0].placeholder = text[lang].nameEn;

  // labels
  const sliderLabels = document.querySelectorAll(".slider-box label");

  sliderLabels[0].childNodes[0].nodeValue = text[lang].price + " ";
  sliderLabels[1].childNodes[0].nodeValue = text[lang].qty + " ";

  // back
  document.querySelector(".back").innerText = text[lang].back;
  document.querySelector(".back-btn").innerText = text[lang].role;

  // toggle UI
  const circle = document.querySelector(".circle");

  if(lang === "en"){
    circle.style.transform = "translateX(40px)";
    circle.innerText = "EN";
  }else{
    circle.style.transform = "translateX(0)";
    circle.innerText = "हिं";
  }
}

/*  TOGGLE CLICK */
document.querySelector(".lang-toggle").addEventListener("click", ()=>{
  currentLang = currentLang === "hi" ? "en" : "hi";
  applyLanguage(currentLang);
});

/* 🚀 LOAD */
window.onload = ()=>{
  applyLanguage(currentLang);
};

function savefasal(){

  // selected image
  let selectedImg =
  document.querySelector(".fasal.active img").src;

  // input value
  let name =
  document.querySelector("input[type='text']").value;

  // slider values
  let price =
  document.querySelectorAll("input[type='range']")[0].value;

  let qty =
  document.querySelectorAll("input[type='range']")[1].value;

  // validation
  if(name === ""){
    alert("नाम भरें");
    return;
  }

  // old products
  let products =
  JSON.parse(localStorage.getItem("products")) || [];

  // new product add
  products.push({
    hi: name,
    en: name,
    price: price,
    qty: qty,
    img: selectedImg,
    status: "Preparing"
  });

  // save
  localStorage.setItem(
    "products",
    JSON.stringify(products)
  );

  // redirect
  window.location.href = "shoppage.html";
}</script>
</html>
