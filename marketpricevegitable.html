<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bhopal Vegetable Price</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#063b3b,#0c5b63,#123f6b);
    min-height:100vh;
    padding:20px;
    color:white;
}

.heading{
    text-align:center;
    margin-bottom:30px;
}

.heading h1{
    font-size:55px;
    font-weight:bold;
}

.heading p{
    color:#d8d8d8;
    margin-top:10px;
    font-size:18px;
}

.search-box{
    display:flex;
    gap:15px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.search-box input,
.search-box select{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:16px;
    outline:none;
}

.search-box option{
    color:black;
}

.search-box button{
    padding:15px 35px;
    border:none;
    border-radius:12px;
    background:#00ffe1;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 20px #00ffe1;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.stat-card{
    background:rgba(255,255,255,0.08);
    padding:25px;
    border-radius:18px;
    backdrop-filter:blur(10px);
}

.stat-card h2{
    font-size:20px;
    margin-bottom:10px;
}

.stat-card p{
    font-size:45px;
    font-weight:bold;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:25px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 15px #00f5a0;
}

.card h2{
    font-size:35px;
    margin-bottom:15px;
}

.card p{
    font-size:20px;
    margin:10px 0;
}

.price{
    color:#00ff95;
    font-weight:bold;
}

.buttons{
    display:flex;
    gap:15px;
    margin-top:20px;
}

.btn{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    color:white;
}

.view-btn{
    background:#00c853;
}

.sound-btn{
    background:#ff9800;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

#backBtn{
    background:rgba(255,255,255,0.1);
    padding:10px 16px;
    border-radius:20px;
    cursor:pointer;
}

.lang-toggle{
    width:70px;
    height:35px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    padding:4px;
    position:relative;
    display:flex;
    align-items:center;
}

.circle{
    width:28px;
    height:28px;
    border-radius:50%;
    background:linear-gradient(45deg,#00f5a0,#00d9ff);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    color:black;
    font-weight:bold;
    transition:0.3s;
}

/* POPUP */

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup-box{
    width:90%;
    max-width:400px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:30px;
    color:white;
    text-align:center;
    box-shadow:0 0 20px #00f5a0;
}

.popup-box h2{
    font-size:35px;
    margin-bottom:15px;
}

.popup-box p{
    font-size:20px;
    margin:10px 0;
}

.close-btn{
    float:right;
    font-size:22px;
    cursor:pointer;
    color:red;
}

@media(max-width:768px){

    .heading h1{
        font-size:40px;
    }

    .container{
        grid-template-columns:1fr;
    }

}



.next-page-btn{
    padding:15px 30px;
    border:none;
    border-radius:12px;
    background:#ffcc00;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 15px #ffcc00;
    transition:0.3s;
}

.next-page-btn:hover{
    transform:scale(1.05);
}


</style>
</head>

<body>

<!-- POPUP -->

<div id="popup" class="popup">

    <div class="popup-box">

        <span class="close-btn" onclick="closePopup()">✖</span>

        <h2 id="popupVeg">Vegetable</h2>

        <p><b>City :</b> <span id="popupCity"></span></p>

        <p><b>Rate :</b>
            <span id="popupPrice" class="price"></span>
        </p>

        <p><b>Status :</b>
            <span id="popupRate"></span>
        </p>

    </div>

</div>

<div class="top-bar">

    <div id="backBtn" onclick="window.location.href='agrohelp.html'">
        ← पीछे
    </div>

    <div class="lang-toggle" onclick="toggleLanguage()">

        <div id="toggleCircle" class="circle">
            EN
        </div>

    </div>

</div>

<div class="heading">



    <div style="text-align:center; margin-bottom:20px;">
    
    <button onclick="openNextPage()" class="next-page-btn">
        Open Marketvegitable price Page
    </button>

</div>

    <h1>Vegetable Price</h1>

    <p>Find latest vegetable prices in Bhopal mandi</p>

</div>

<div class="search-box">

    <input type="text" placeholder="Search Vegetable...">

    <select>

        <option>All Vegetables</option>
        <option>आलू</option>
        <option>प्याज</option>
        <option>टमाटर</option>
        <option>भिंडी</option>
        <option>बैंगन</option>

    </select>

    <select>

        <option>Select Place</option>
        <option>Bhopal</option>
        <option>Indore</option>
        <option>Vidisha</option>
        <option>Raisen</option>

    </select>

    <button>Search</button>

</div>

<div class="stats">

    <div class="stat-card">

        <h2>Total Vegetables</h2>

        <p>10</p>

    </div>

    <div class="stat-card">

        <h2>Updated Time</h2>

        <p id="time">--</p>

    </div>

</div>

<div class="container" id="mandiContainer"></div>

<script>

let currentLang = "en";

// Vegetable Data

const mandiData = [

{
    crop:"🥔 आलू",
    price:"₹18/kg",
    city:"Bhopal",
    rate:"Normal"
},

{
    crop:"🧅 प्याज",
    price:"₹30/kg",
    city:"Bhopal",
    rate:"High"
},

{
    crop:"🍅 टमाटर",
    price:"₹25/kg",
    city:"Bhopal",
    rate:"Medium"
},

{
    crop:"🥬 पत्तागोभी",
    price:"₹20/kg",
    city:"Bhopal",
    rate:"Normal"
},

{
    crop:"🥕 गाजर",
    price:"₹40/kg",
    city:"Bhopal",
    rate:"High"
},

{
    crop:"🌶️ मिर्च",
    price:"₹60/kg",
    city:"Bhopal",
    rate:"High"
},

{
    crop:"🥒 खीरा",
    price:"₹28/kg",
    city:"Bhopal",
    rate:"Medium"
},

{
    crop:"🍆 बैंगन",
    price:"₹22/kg",
    city:"Bhopal",
    rate:"Normal"
},

{
    crop:"🧄 लहसुन",
    price:"₹140/kg",
    city:"Bhopal",
    rate:"High"
},

{
    crop:"🍀 भिंडी",
    price:"₹35/kg",
    city:"Bhopal",
    rate:"Medium"
}

];

const container = document.getElementById("mandiContainer");

// Create Cards

mandiData.forEach(item => {

container.innerHTML += `

<div class="card">

    <h2>${item.crop}</h2>

    

    <div class="buttons">

        <button class="btn view-btn"

        onclick="openPopup(
        '${item.crop}',
        '${item.city}',
        '${item.price}',
        '${item.rate}'
        )">

        View

        </button>

        <button class="btn sound-btn"

        onclick="playSound(
        '${item.crop}',
        '${item.price}'
        )">

        🔊 Sound

        </button>

    </div>

</div>

`;

});

// Time

const now = new Date();

document.getElementById("time").innerHTML =
now.getHours() + ":" + now.getMinutes();

// Sound

function playSound(crop, price){

    let speech = new SpeechSynthesisUtterance();

    speech.text =
    crop + " का आज का भाव " + price;

    speech.lang = "hi-IN";

    speech.volume = 1;

    speech.rate = 1;

    speech.pitch = 1;

    window.speechSynthesis.speak(speech);

}

// Popup Open

function openPopup(crop, city, price, rate){

    document.getElementById("popupVeg").innerText = crop;

    document.getElementById("popupCity").innerText = city;

    document.getElementById("popupPrice").innerText = price;

    document.getElementById("popupRate").innerText = rate;

    document.getElementById("popup").style.display = "flex";

}

// Popup Close

function closePopup(){

    document.getElementById("popup").style.display = "none";

}

// Language Toggle

function toggleLanguage(){

    currentLang = currentLang === "en" ? "hi" : "en";

    const circle =
    document.getElementById("toggleCircle");

    if(currentLang === "hi"){

        circle.style.transform =
        "translateX(30px)";

        circle.innerText = "हिं";

        document.querySelector(".heading h1")
        .innerText = "सब्जी मंडी भाव";

    }

    else{

        circle.style.transform =
        "translateX(0px)";

        circle.innerText = "EN";

        document.querySelector(".heading h1")
        .innerText = "Vegetable Price";

    }

}

function openNextPage(){

    window.location.href = "marketprice.html";

}



</script>

</body>
</html>
