


<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meri Dukaan</title>

  <link rel="stylesheet" href="style.css">

  <style>



*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  display:flex;
  justify-content:center;

  background: radial-gradient(circle at 20% 20%, #00f5a033, transparent),
              radial-gradient(circle at 80% 30%, #00d9ff33, transparent),
              radial-gradient(circle at 50% 80%, #00f5a022, transparent),
              #0f172a;

  color:white;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:420px;
  padding:20px;

  display:flex;
  flex-direction:column;
  gap:15px;

  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:25px;

  box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

/* TOP */
.top-bar{
  display:flex;
  justify-content:space-between;
}

/* TOGGLE */
.lang-toggle{
  width:90px;
  height:45px;
  border-radius:30px;
  padding:5px;
  display:flex;
  align-items:center;
  position:relative;

  background:rgba(255,255,255,0.1);
  cursor:pointer;
}

.circle{
  width:35px;
  height:35px;
  border-radius:50%;
  background:linear-gradient(45deg,#00f5a0,#00d9ff);
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-weight:bold;
  transition:0.3s;
}

.label{
  position:absolute;
  right:10px;
}

/* SEARCH */
#search{
  padding:14px;
  border-radius:25px;
  border:1px solid rgba(255,255,255,0.2);

  background:rgba(255,255,255,0.08);
  color:white;
  outline:none;
}

#search:focus{
  border:1px solid #00f5a0;
  box-shadow:0 0 10px #00f5a0;
}

/* ADD BUTTON */
.add-btn{
  padding:15px;
  border:none;
  border-radius:30px;

  background:linear-gradient(45deg,#00f5a0,#00d9ff);
  color:black;
  font-weight:bold;

  box-shadow:0 6px 0 #009e82;
}

.add-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 0 20px #00f5a0;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

/* CARD */
.card{
  padding:15px;
  border-radius:20px;

  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);

  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00f5a0;
}

.card img{
  width:80px;
}

/* PRICE */
.price{
  color:#00f5a0;
  font-weight:bold;
}

/* REMOVE */
.remove-btn{
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:20px;
  background:rgba(255,255,255,0.2);
  color:white;
}
.img{
  width:170px;
}

.Buy{
background-color: #00f5a0;
margin-top:8px;background:#00f5a0;color:black;width:100%;padding:10px;border:none;border-radius:15px;
}

.status{
  color:#00f5a0;
  font-weight:bold;
}

.status-btn{
  margin-top:8px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:15px;
  background:#00d9ff;
  color:black;
  font-weight:bold;
}

.remove-btn{
  margin-top:8px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:15px;
  background:red;
  color:white;
  font-weight:bold;
}
  </style>
</head>

<body>

<div class="container">

  <!-- TOP -->
  <div class="top-bar">
    <div id="backBtn" class="back-btn"  onclick="window.location.href='agrohelp.html'">← पीछे</div>

    <div class="lang-toggle" onclick="toggleLanguage()">
      <div id="toggleCircle" class="circle">हिं</div>
      <span class="label">EN</span>
    </div>
  </div>

  <!-- TITLE -->
  <h2 id="title">मेरी दुकान</h2>

  <!-- SEARCH -->
  <input type="text" id="search" placeholder="ढूंढें...">

  <!-- ADD BUTTON -->
  <button id="addBtn"  onclick="window.location.href='sabjijode.html'" class="add-btn">＋ सब्जी जोड़ें</button>
<!--add button for crops-->
    <button id="addCropBtn"  onclick="window.location.href='aanaj.html'" class="add-btn">＋ फ़सल जोड़ें</button>
  <!-- PRODUCTS -->
  <div class="products">

    <div class="card">
      <img src="https://pngimg.com/uploads/onion/onion_PNG99213.png">
      <h3 class="item-name">प्याज</h3>
      <p class="price">₹25/kg</p>
      <button class="Buy">Buy</button>
    </div>

    <div class="card">
      <img src="https://pngimg.com/uploads/carrot/carrot_PNG4986.png">
      <h3 class="item-name">गाजर</h3>
      <p class="price">₹20/kg</p>
     <button class="Buy">Buy</button>
    </div>

    <div class="card">
      <img src="https://pngimg.com/uploads/potato/potato_PNG7086.png">
      <h3 class="item-name">आलू</h3>
      <p class="price">₹18/kg</p>
     <button class="Buy">Buy</button>
    </div>

    <div class="card">
      <img src="https://pngimg.com/uploads/tomato/tomato_PNG12572.png">
      <h3 class="item-name">टमाटर</h3>
      <p class="price">₹30/kg</p>
<button class="Buy">Buy</button>
    
    </div>

    <div class="card">
      <img src="https://pngimg.com/uploads/broccoli/broccoli_PNG72904.png">
      <h3 class="item-name">ब्रोकली</h3>
      <p class="price">₹30/kg</p>
    <button class="Buy">Buy</button>
    </div>

    <div class="card">
      <img src="https://pngimg.com/uploads/pepper/pepper_PNG3265.png">
      <h3 class="item-name">शिमला मिर्च</h3>
      <p class="price">₹30/kg</p>
      <button class="Buy">Buy</button>
   
    </div>

  </div>

</div>



</body>

<script>
    let currentLang = localStorage.getItem("lang") || "hi";

/* 🌱 DEFAULT DATA (image + 2 language) */
const defaultProducts = [
  {
    hi:"प्याज", en:"Onion", price:25,
    img:"https://pngimg.com/uploads/onion/onion_PNG99213.png"
  },
  {
    hi:"गाजर", en:"Carrot", price:20,
    img:"https://pngimg.com/uploads/carrot/carrot_PNG4986.png"
  },
  {
    hi:"आलू", en:"Potato", price:18,
    img:"https://pngimg.com/uploads/potato/potato_PNG7086.png"
  },
  {
    hi:"टमाटर", en:"Tomato", price:30,
    img:"https://pngimg.com/uploads/tomato/tomato_PNG12572.png"
  },
  {
    hi:"ब्रोकली", en:"Broccoli", price:40,
    img:"https://pngimg.com/uploads/broccoli/broccoli_PNG72904.png"
  },
  {
    hi:"शिमला मिर्च", en:"Capsicum", price:35,
    img:"https://pngimg.com/uploads/pepper/pepper_PNG3265.png"
  }
];

/* 🔥 LOAD DATA */
let products = JSON.parse(localStorage.getItem("products"));
if(!products || products.length === 0){
  products = defaultProducts;
}

/* 🌐 TEXT */
const text = {
  hi:{
    title:"मेरी दुकान",
    search:"ढूंढें...",
    add:"＋ सब्जी जोड़ें",
    addCropBtn:"+ फ़सल जोड़ें",
    back:"← पीछे",
    promptName:"सब्जी का नाम डालें",
    promptPrice:"कीमत डालें"
  },
  en:{
    title:"My Shop",
    search:"Search...",
    add:"＋ Add Vegetable",
    addCropBtn: "+ Add Crop",
    back:"← Back",
    promptName:"Enter vegetable name",
    promptPrice:"Enter price"
  }
};

/* 🔥 RENDER */
function renderProducts(){
  const container = document.querySelector(".products");
  container.innerHTML = "";

  products.forEach((item,index)=>{

    const name = currentLang === "hi" ? item.hi : item.en;

    const card = document.createElement("div");
    card.className = "card";

    // अगर status नहीं है तो default
    if(!item.status){
      item.status = "Preparing";
    }

    card.innerHTML = `
      <img src="${item.img}">
      <h3 class="item-name">${name}</h3>
      <p class="price">₹${item.price}/kg</p>

      <p><b>Status:</b> 
        <span class="status">${item.status}</span>
      </p>

      <button class="Buy">Buy</button>

      <button class="status-btn">
        Change Status
      </button>

      <button class="remove-btn">
        Delete
      </button>
    `;

    /* BUY */
    card.querySelector(".Buy")
    .addEventListener("click", ()=>{
      alert(`${name} खरीदा गया`);
    });

    /* DELIVERY STATUS CHANGE */
    card.querySelector(".status-btn")
    .addEventListener("click", ()=>{

      const allStatus = [
        "Preparing",
        "Packed",
        "Out for Delivery",
        "Delivered"
      ];

      let currentIndex =
      allStatus.indexOf(item.status);

      if(currentIndex < allStatus.length - 1){
        item.status =
        allStatus[currentIndex + 1];
      }else{
        item.status = allStatus[0];
      }

      saveData();
      renderProducts();
    });

    /* DELETE PRODUCT */
    card.querySelector(".remove-btn")
    .addEventListener("click", ()=>{

      if(confirm("Delete this product?")){
        products.splice(index,1);

        saveData();
        renderProducts();
      }
    });

    container.appendChild(card);
  });
}
/* 💾 SAVE */
// localStorage data
function saveData(){
  localStorage.setItem(
    "products",
    JSON.stringify(products)
  );
}

/* 🔍 SEARCH */
function setupSearch(){
  document.getElementById("search").addEventListener("input", function(){
    let value = this.value.toLowerCase();

    document.querySelectorAll(".card").forEach(card=>{
      let name = card.querySelector(".item-name").innerText.toLowerCase();
      card.style.display = name.includes(value) ? "flex" : "none";
    });
  });
}

/* 🌐 LANGUAGE */
function applyLanguage(lang){
  currentLang = lang;

  document.getElementById("title").innerText = text[lang].title;
  document.getElementById("search").placeholder = text[lang].search;
  document.getElementById("addBtn").innerText = text[lang].add;
  document.getElementById("backBtn").innerText = text[lang].back;

  renderProducts(); // 🔥 card text update

  const circle = document.getElementById("toggleCircle");

  if(lang==="en"){
    circle.style.transform="translateX(40px)";
    circle.innerText="EN";
  }else{
    circle.style.transform="translateX(0)";
    circle.innerText="हिं";
  }
}

/* 🔁 TOGGLE */
function toggleLanguage(){
  currentLang = currentLang==="hi" ? "en" : "hi";
  localStorage.setItem("lang", currentLang);
  applyLanguage(currentLang);
}

/* 🚀 LOAD */
window.onload = ()=>{
  applyLanguage(currentLang);
  renderProducts();
  
  setupSearch();
};
</script>
</html>
