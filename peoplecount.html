

<!DOCTYPE html> 

<html lang="hi"> 

<head> 

  <meta charset="UTF-8"> 

  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

  <title>People Count</title> 

 

 <link rel="stylesheet" href="style.css"> 

<style>

    *{ 

 margin:0; 

 padding:0; 

 box-sizing:border-box; 

 font-family:'Poppins',sans-serif; 

} 

 

/* 🌌 BACKGROUND */ 

body{ 

 min-height:100vh; 

 display:flex; 

 justify-content:center; 

 align-items:center; 

 
 background: radial-gradient(circle at 20% 20%, #00f5a033, transparent), 

 radial-gradient(circle at 80% 30%, #00d9ff33, transparent), 

 radial-gradient(circle at 50% 80%, #00f5a022, transparent), 

 #0f172a; 

 

 color:white; 

} 

 

/* 💎 CONTAINER */ 

.container{ 

 width:100%; 

 max-width:420px; 

 padding:20px; 

 margin:20px; 

 

 background:rgba(255,255,255,0.05); 

 backdrop-filter:blur(15px); 

 

 border-radius:25px; 

 box-shadow:0 10px 40px rgba(0,0,0,0.3); 

} 

 

/* TOP */ 

.top-bar{ 

 display:flex; 

 justify-content:space-between; 

} 

 

.role-btn{ 

 padding:10px 15px; 

 border-radius:20px; 

 background:rgba(255,255,255,0.1); 

 cursor:pointer; 

 transition:0.3s; 

} 

.role-btn:hover{ 

 box-shadow:0 0 10px #00f5a0; 

} 

 

/* TOGGLE */ 

.lang-toggle{ 
 width:90px; 

 height:45px; 

 border-radius:30px; 

 padding:5px; 

 display:flex; 

 align-items:center; 

 position:relative; 

 background:rgba(255,255,255,0.1); 

 cursor:pointer; 

} 

 

.circle{ 

 width:35px; 

 height:35px; 

 border-radius:50%; 
 background:linear-gradient(45deg,#00f5a0,#00d9ff); 

 display:flex; 

 align-items:center; 

 justify-content:center; 
 color:black; 

 font-weight:bold; 

 transition:0.3s; 

} 

 

.lang-text{ 

 position:absolute; 

 right:10px; 

} 

 

/* BACK */ 

.back{ 
 margin:15px 0; 

} 

 

/* STEPS */ 

.steps{ 

 display:flex; 

 justify-content:center; 

 align-items:center; 
 margin:15px 0; 

} 

 

.step{ 

 width:35px; 

 height:35px; 

 border-radius:50%; 

 background:rgba(255,255,255,0.2); 

 display:flex; 
 align-items:center; 

 justify-content:center; 

} 

 

.step.active{ 

 background:#00f5a0; 

 color:black; 

} 

 

.step.done{ 

 background:#00f5a0; 

} 

 

.line{ 

 width:40px; 

 height:4px; 

 background:rgba(255,255,255,0.2); 

} 

 

.line.active{ 

 background:#00f5a0; 

} 

 

/* TITLE */ 

h2{ 

 text-align:center; 

} 

 

/* AUDIO */ 

.audio-btn{ 

 display:block; 

 margin:10px auto; 

 padding:10px 20px; 

 border-radius:25px; 

 border:none; 

 background:linear-gradient(45deg,#00f5a0,#00d9ff); 

 box-shadow:0 0 10px #00f5a0; 

} 

 

/* COUNT */ 

.count-box{ 

 background:rgba(255,255,255,0.08); 

 border-radius:25px; 

 text-align:center; 

 padding:30px; 

 margin:20px 0; 

} 

 

/* CONTROLS */ 

.controls{ 

 display:flex; 

 align-items:center; 

 justify-content:space-between; 

 gap:10px; 

} 

 

.controls button{ 

 width:50px; 

 height:50px; 

 border-radius:50%; 

 border:none; 

 font-size:22px; 

 background:#ffc107; 

} 

 

input[type=range]{ 

 flex:1; 

} 

 

/* BUTTONS */ 

.bottom-btns{ 

 display:flex; 

 gap:10px; 

 margin-top:20px; 

} 

 

.back-btn{ 

 flex:1; 

 padding:15px; 

 border-radius:25px; 

background:linear-gradient(45deg,#56a68a,#00d9ff); 

 border:none; 
 box-shadow:0 0 15px #00f5a0; 

 transition:0.2s; 

} 

.back-btn:hover{ 

 box-shadow:0 0 10px #00f5a0; 

} 

 

.next-btn{ 

 flex:1; 

 padding:15px; 

 border-radius:25px; 

 background:linear-gradient(45deg,#00f5a0,#4a909c); 

 border:none; 

 box-shadow:0 0 15px #00f5a0; 

 transition:0.2s; 

} 

.next-btn:hover{ 

 box-shadow:0 0 10px #00f5a0; 

} 

 

/* 📱 MOBILE */ 

@media (max-width:480px){ 

 .container{ 

 max-width:100%; 

  border-radius:0; 

 } 

} 

 

/* 💻 TABLET */ 

@media (min-width:768px){ 

 .container{ 

 max-width:500px; 

 } 

} 

 

/* 🖥️ DESKTOP */ 

@media (min-width:1024px){ 

 .container{ 

 max-width:420px; 

 box-shadow:0 0 50px rgba(0,255,200,0.2); 

 } 

} 
</style>

</head> 

 

<body> 

 

<div class="container"> 

 

  <!-- TOP --> 

  <div class="top-bar"> 

    <div id="roleText" class="role-btn" onclick="window.location.href='agrohelp.html'">← रोल बदलें</div> 

 

    <div class="lang-toggle" onclick="toggleLanguage()"> 

      <div id="toggleCircle" class="circle">हिं</div> 

      <span class="lang-text">EN</span> 

    </div> 

  </div> 

 

  <!-- BACK --> 

  <div class="back">← <span id="backText"  onclick="window.location.href='work.html'">पीछे</span></div> 

 

  <!-- STEPS --> 

  <div class="steps"> 

    <div class="step done">✔</div> 

    <div class="line active"></div> 

    <div class="step active">2</div> 

    <div class="line"></div> 

    <div class="step">3</div> 

  </div> 

 

  <!-- TITLE --> 

  <h2 id="title">कितने लोग?</h2> 

 

  <button id="audioBtn" class="audio-btn">🔊 सुनने के लिए दबाएं</button> 

 

  <!-- COUNT BOX --> 

  <div class="count-box"> 

    <h1 id="count">2</h1> 

    <p>👥</p> 

  </div> 

 

  <!-- CONTROLS --> 

  <div class="controls"> 

    <button onclick="decrease()">−</button> 

 

    <input type="range" min="1" max="100" value="2" id="slider" oninput="updateSlider(this.value)"> 

 

    <button onclick="increase()">+</button> 

  </div> 

 

  <!-- BUTTONS --> 

  <div class="bottom-btns"> 

    <button class="back-btn" id="backBtn" onclick="window.location.href='work.html'">← पीछे</button> 

    <button class="next-btn" id="nextBtn" onclick="window.location.href='majduri.html'">आगे →</button> 

  </div> 

 

</div> 

 



</body> 
<script>

    let count = 2; 

let currentLang = localStorage.getItem("lang") || "hi"; 

 

/* COUNT */ 

function updateUI(){ 

  document.getElementById("count").innerText = count; 

  document.getElementById("slider").value = count; 

} 

 

function increase(){ 

  if(count < 100){ count++; updateUI(); } 

} 

 

function decrease(){ 

  if(count > 1){ count--; updateUI(); } 

} 

 

function updateSlider(val){ 

  count = val; 

  updateUI(); 

} 

 

/* LANGUAGE */ 

function toggleLanguage(){ 

  currentLang = currentLang === "hi" ? "en" : "hi"; 

  localStorage.setItem("lang", currentLang); 

  applyLanguage(currentLang); 

} 

 

function applyLanguage(lang){ 

 

  document.getElementById("title").innerText = 

    lang === "hi" ? "कितने लोग?" : "How many people?"; 

 

  document.getElementById("audioBtn").innerText = 

    lang === "hi" ? "🔊 सुनने के लिए दबाएं" : "🔊 Tap to listen"; 

 

  document.getElementById("backText").innerText = 

    lang === "hi" ? "पीछे" : "Back"; 

 

  document.getElementById("backBtn").innerText = 

    lang === "hi" ? "← पीछे" : "← Back"; 

 

  document.getElementById("nextBtn").innerText = 

    lang === "hi" ? "आगे →" : "Next →"; 

 

  // ⭐ FIX HERE 

  document.getElementById("roleText").innerText = 

    lang === "hi" ? "← रोल बदलें" : "← Change Role"; 

 

  const circle = document.getElementById("toggleCircle"); 

 

  if(lang === "en"){ 

    circle.style.transform = "translateX(40px)"; 

    circle.innerText = "EN"; 

  } else { 

    circle.style.transform = "translateX(0)"; 

    circle.innerText = "हिं"; 

  } 

} 

 

window.onload = () => { 

  applyLanguage(currentLang); 

  updateUI(); 

}; 
function updateUI(){
  document.getElementById("count").innerText = count;
  document.getElementById("slider").value = count;

  // SAVE PEOPLE COUNT
  localStorage.setItem("selectedWorkers", count);
}
 
</script>

</html>
