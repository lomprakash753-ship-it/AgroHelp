

<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Success</title>

  <link rel="stylesheet" href="style.css">
</head>

<style>

    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* 🌌 SAME PREMIUM BACKGROUND */
body{
  display:flex;
  justify-content:center;

  background: radial-gradient(circle at 20% 20%, #00f5a033, transparent),
              radial-gradient(circle at 80% 30%, #00d9ff33, transparent),
              radial-gradient(circle at 50% 80%, #00f5a022, transparent),
              #0f172a;

  color:white;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:420px;
  padding:20px;
  text-align:center;

  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:25px;
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

/* TOP */
.top-bar{
  display:flex;
  justify-content:space-between;
  margin-bottom:30px;
}

/* ROLE BTN */
.role-btn{
  padding:10px 15px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  cursor:pointer;
  transition: 0.3s;
}
.role-btn:hover{
  
     box-shadow:0 0 30px #4e96a2;
}

/* TOGGLE */
.lang-toggle{
  width:90px;
  height:45px;
  border-radius:30px;
  display:flex;
  align-items:center;
  padding:5px;
  position:relative;

  background:rgba(255,255,255,0.1);
  cursor:pointer;
}

.circle{
  width:35px;
  height:35px;
  border-radius:50%;
  background:linear-gradient(45deg,#00f5a0,#00d9ff);
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-weight:bold;
  transition:0.3s;
}

.lang-text{
  position:absolute;
  right:10px;
}

/* ✅ SUCCESS ICON */
.success-icon{
  width:120px;
  height:120px;
  margin:40px auto;

  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;

  font-size:50px;
  font-weight:bold;

  background:linear-gradient(45deg,#00f5a0,#00d9ff);
  color:#0f172a;

  box-shadow:0 0 30px #00f5a0;

  animation: pop 0.6s ease;
}

/* POP ANIMATION */
@keyframes pop{
  0%{transform:scale(0.5);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}

/* TITLE */
h2{
  margin-bottom:20px;
}

/* AUDIO */
.audio-btn{
  background:linear-gradient(45deg,#00f5a0,#00d9ff);
  border:none;
  padding:12px 25px;
  border-radius:25px;

  box-shadow:0 0 15px #00f5a0;
  margin-bottom:30px;
}

/* 🔥 FIXED BUTTON (THEME MATCH) */
.home-btn{
  width:100%;
  padding:18px;
  border-radius:30px;

  background:linear-gradient(45deg,#00f5a0,#00d9ff);
  border:none;

  font-size:18px;
  font-weight:bold;

  box-shadow:0 0 20px #00f5a0;
  cursor:pointer;
  transition:0.3s;
}

.home-btn:hover{
  transform:scale(1.03);
  box-shadow:0 0 30px #00d9ff;
}


</style>

<body>

<div class="container">

  <!-- TOP -->
  <div class="top-bar">
    <div id="roleText" class="role-btn" onclick="window.location.href='agrohelp.html'">← रोल बदलें</div>

    <div class="lang-toggle" onclick="toggleLanguage()">
      <div id="toggleCircle" class="circle">हिं</div>
      <span class="lang-text">EN</span>
    </div>
  </div>

  <!-- SUCCESS ICON -->
  <div class="success-icon">
    ✓
  </div>

  <!-- TEXT -->
  <h2 id="title">काम लगा दिया!</h2>

  <button id="audioBtn" class="audio-btn">
    🔊 सुनने के लिए दबाएं
  </button>

  <!-- BUTTON -->
  <button class="home-btn"  onlclick="window.location.href='agrohelp.html'">
    <span id="homeText" onclick="window.location.href='jobpost.html'">घर वापस</span>
  </button>

</div>

<script src="script.js"></script>
</body>

<script>

    let currentLang = localStorage.getItem("lang") || "hi";

function toggleLanguage(){
  currentLang = currentLang === "hi" ? "en" : "hi";
  localStorage.setItem("lang", currentLang);
  applyLanguage(currentLang);
}

function applyLanguage(lang){

  document.getElementById("title").innerText =
    lang === "hi" ? "काम लगा दिया!" : "Work Assigned!";

  document.getElementById("homeText").innerText =
    lang === "hi" ? "घर वापस" : "Go Home";

  document.getElementById("audioBtn").innerText =
    lang === "hi" ? "🔊 सुनने के लिए दबाएं" : "🔊 Tap to listen";

  document.getElementById("roleText").innerText =
    lang === "hi" ? "← रोल बदलें" : "← Change Role";

  const circle = document.getElementById("toggleCircle");

  if(lang === "en"){
    circle.style.transform = "translateX(40px)";
    circle.innerText = "EN";
  }else{
    circle.style.transform = "translateX(0)";
    circle.innerText = "हिं";
  }
}

/* NAVIGATION */
function goHome(){
  window.location.href = "index.html"; // change if needed
}

window.onload = () => {
  applyLanguage(currentLang);
};
</script>
</html>
