

<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabji Jode</title>

  <link rel="stylesheet" href="style.css">
  <style> 
    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  display:flex;
  justify-content:center;

  background: radial-gradient(circle at 20% 20%, #00f5a033, transparent),
              radial-gradient(circle at 80% 30%, #00d9ff33, transparent),
              radial-gradient(circle at 50% 80%, #00f5a022, transparent),
              #0f172a;

  color:white;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:420px;
  padding:20px;

  display:flex;
  flex-direction:column;
  gap:15px;

  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:25px;

  box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

/* TOP */
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.back-btn{
  background:rgba(255,255,255,0.1);
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
}

/* TOGGLE */
.lang-toggle{
  width:90px;
  height:45px;
  border-radius:30px;
  padding:5px;
  display:flex;
  align-items:center;
  position:relative;

  background:rgba(255,255,255,0.1);
}

.circle{
  width:35px;
  height:35px;
  border-radius:50%;
  background:linear-gradient(45deg,#00f5a0,#00d9ff);
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-weight:bold;
}

.label{
  position:absolute;
  right:10px;
}

/* HEADING */
.heading{
  text-align:center;
}

/* AUDIO */
.audio-btn{
  margin:auto;
  background:linear-gradient(45deg,#00f5a0,#00d9ff);
  border:none;
  padding:12px 20px;
  border-radius:25px;
  cursor:pointer;
}

/* VEG LIST */
.label-text{
  margin-top:10px;
}

.veg-list{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}

.veg{
  width:65px;
  height:65px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  display:flex;
  justify-content:center;
  align-items:center;
  border:2px solid transparent;
  cursor:pointer;
  transition:0.3s;
}

.veg img{
  width:40px;
}

.veg.active{
  border:2px solid #00f5a0;
  box-shadow:0 0 10px #00f5a0;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border-radius:20px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* SLIDER BOX */
.slider-box{
  background:rgba(255,255,255,0.08);
  padding:15px;
  border-radius:20px;
}

.slider-box label{
  display:flex;
  justify-content:space-between;
  margin-bottom:5px;
}

input[type="range"]{
  width:100%;
}

/* HOVER EFFECT */
.veg:hover{
  transform:scale(1.1);
}

.save-btn{
  width:100%;
  padding:15px;
  margin-top:20px;

  border:none;
  border-radius:30px;

  font-size:16px;
  font-weight:600;

  color:white;

  background:linear-gradient(45deg,#00f5a0,#00d9ff);

  box-shadow:0 5px 0 #008f6a,
             0 0 20px #00f5a0;

  cursor:pointer;
  transition:0.3s;
}

/* 🔥 Hover Effect */
.save-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 0 #008f6a,
             0 0 30px #00f5a0;
}

/* 🔥 Click Effect */
.save-btn:active{
  transform:translateY(2px);
  box-shadow:0 2px 0 #008f6a;
}
  </style>
</head>

<body>

<div class="container">

  <!-- TOP -->
  <div class="top-bar">
    <div class="back-btn" onclick="window.location.href='agrohelp.html'">← रोल बदलें</div>

    <div class="lang-toggle">
      <div class="circle">हिं</div>
      <span>EN</span>
    </div>
  </div>

  <!-- BACK -->
  <div class="back" onclick="window.location.href='shoppage.html'">← पीछे</div>

  <!-- TITLE -->
  <h1>सब्ज़ी जोड़ें</h1>


  <div class="veg-list">

<div class="veg active">
  <img src="https://pngimg.com/uploads/tomato/tomato_PNG12572.png">
</div>

<div class="veg">
  <img src="https://pngimg.com/uploads/potato/potato_PNG7086.png">
</div>

<div class="veg">
  <img src="https://pngimg.com/uploads/onion/onion_PNG99213.png">
</div>

<div class="veg">
  <img src="https://pngimg.com/uploads/broccoli/broccoli_PNG72904.png">
</div>

<div class="veg">
  <img src="https://pngimg.com/uploads/carrot/carrot_PNG4986.png">
</div>

<!-- Moong Daal -->
<div class="veg">
  <img src="https://cdn-icons-png.flaticon.com/512/3143/3143643.png" alt="Moong Daal">
</div>

<!-- Gehu -->
<div class="veg">
  <img src="https://cdn-icons-png.flaticon.com/512/2346/2346958.png" alt="Wheat">
</div>

<!-- Chawal -->
<div class="veg">
  <img src="https://cdn-icons-png.flaticon.com/512/1046/1046857.png" alt="Rice">
</div>

<!-- Dhaan -->
<div class="veg">
  <img src="https://cdn-icons-png.flaticon.com/512/766/766020.png" alt="Paddy">
</div>

<!-- Soyabeen -->
<div class="veg">
  <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png" alt="Soyabean">
</div>

  </div>

  <!-- INPUTS -->
  <input type="text" placeholder="नाम (हिंदी)">
  <input type="text" placeholder="नाम (English)">

  <!-- PRICE -->
  <div class="slider-box">
    <label>दाम / किलो <span>₹25</span></label>
    <input type="range" min="1" max="100" value="25">
  </div>

  <!-- QTY -->
  <div class="slider-box">
    <label>मात्रा (किलो) <span>20</span></label>
    <input type="range" min="1" max="100" value="20">
  </div>
<button class="save-btn" onclick="saveVegetable()">✔ हो गया</button>
</div>
<script src="script.js"></script>
</body>
<script>
  let currentLang = "hi";

/* 🌐 TEXT */
const text = {
  hi:{
    title:"सब्ज़ी जोड़ें",
    nameHi:"नाम (हिंदी)",
    nameEn:"नाम (English)",
    price:"दाम / किलो",
    qty:"मात्रा (किलो)",
    back:"← पीछे",
    role:"← रोल बदलें"
  },
  en:{
    title:"Add Vegetable",
    nameHi:"Name (Hindi)",
    nameEn:"Name (English)",
    price:"Price / kg",
    qty:"Quantity (kg)",
    back:"← Back",
    role:"← Change Role"
  }
};

/* 🟢 VEG CLICK (GLOW) */
const vegs = document.querySelectorAll(".veg");

vegs.forEach(veg=>{
  veg.addEventListener("click", ()=>{
    vegs.forEach(v => v.classList.remove("active"));
    veg.classList.add("active");
  });
});

/* 🎚 SLIDER VALUE UPDATE */
const sliders = document.querySelectorAll("input[type='range']");
const labels = document.querySelectorAll(".slider-box label span");

sliders.forEach((slider,index)=>{
  slider.addEventListener("input", ()=>{
    if(index === 0){
      labels[index].innerText = "₹" + slider.value;
    }else{
      labels[index].innerText = slider.value;
    }
  });
});

/* 🌐 LANGUAGE APPLY */
function applyLanguage(lang){

  currentLang = lang;

  // title
  document.querySelector("h1").innerText = text[lang].title;

  // inputs
  const inputs = document.querySelectorAll("input[type='text']");
  inputs[0].placeholder = text[lang].nameHi;
  inputs[1].placeholder = text[lang].nameEn;

  // labels
  const sliderLabels = document.querySelectorAll(".slider-box label");

  sliderLabels[0].childNodes[0].nodeValue = text[lang].price + " ";
  sliderLabels[1].childNodes[0].nodeValue = text[lang].qty + " ";

  // back
  document.querySelector(".back").innerText = text[lang].back;
  document.querySelector(".back-btn").innerText = text[lang].role;

  // toggle UI
  const circle = document.querySelector(".circle");

  if(lang === "en"){
    circle.style.transform = "translateX(40px)";
    circle.innerText = "EN";
  }else{
    circle.style.transform = "translateX(0)";
    circle.innerText = "हिं";
  }
}

/* 🔁 TOGGLE CLICK */
document.querySelector(".lang-toggle").addEventListener("click", ()=>{
  currentLang = currentLang === "hi" ? "en" : "hi";
  applyLanguage(currentLang);
});

/* 🚀 LOAD */
window.onload = ()=>{
  applyLanguage(currentLang);
};

function saveVegetable(){

  // selected image
  let selectedImg = document.querySelector(".veg.active img").src;

  // input values
  let nameHi = document.querySelectorAll("input[type='text']")[0].value;
  let nameEn = document.querySelectorAll("input[type='text']")[1].value;

  // slider values
  let price = document.querySelectorAll("input[type='range']")[0].value;
  let qty = document.querySelectorAll("input[type='range']")[1].value;

  // validation
  if(nameHi === "" || nameEn === ""){
    alert("नाम भरें");
    return;
  }

  // old products get
  let products = JSON.parse(localStorage.getItem("products")) || [];

  // add new product
  products.push({
    hi: nameHi,
    en: nameEn,
    price: price,
    qty: qty,
    img: selectedImg
  });

  // save
  localStorage.setItem("products", JSON.stringify(products));

  // next page
  window.location.href = "shoppage.html";
}
</script>
</html>
