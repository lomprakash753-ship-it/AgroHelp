<html lang="hi"> 

<head> 

 <meta charset="UTF-8"> 

 <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

 <title>OTP Page</title> 

 

 <link rel="stylesheet" href="style.css"> 
<style>

    

* { 

 margin: 0; 

 padding: 0; 

 box-sizing: border-box; 

 font-family: 'Poppins', sans-serif; 

} 

 

/* ===== BACKGROUND ===== */ 

body { 

 display: flex; 

 justify-content: center; 

 align-items: center; 

 height: 100vh; 

 

 background: radial-gradient(circle at 20% 20%, #00f5a033, transparent), 

 radial-gradient(circle at 80% 30%, #00d9ff33, transparent), 

 radial-gradient(circle at 50% 80%, #00f5a022, transparent), 

 #0f172a; 

 

 color: white; 

} 

 

/* ===== CONTAINER ===== */ 

.container { 

 width: 100%; 

 max-width: 400px; 

 padding: 20px; 

 

 background: rgba(255,255,255,0.05); 

 backdrop-filter: blur(15px); 

 border-radius: 25px; 

 

 box-shadow: 0 10px 40px rgba(0,0,0,0.4); 

} 

 

/* ===== TOP ===== */ 

.top-bar { 

 display: flex; 

 justify-content: space-between; 

 align-items: center; 

} 

 

.back-btn { 
 background: rgba(255,255,255,0.1); 

 padding: 8px 12px; 

 border-radius: 20px; 

} 

 

/* ===== TOGGLE ===== */ 

.lang-toggle { 

 width: 90px; 

 height: 45px; 
 background: rgba(255,255,255,0.1); 

 border-radius: 30px; 
 display: flex; 

 align-items: center; 

 padding: 5px; 

} 

 

.circle { 

width: 35px; 

height: 35px; 

 background: linear-gradient(45deg, #00f5a0, #00d9ff); 

 border-radius: 50%; 

 display: flex; 

 align-items: center; 
 justify-content: center; 

 color: black; 

 font-weight: bold; 
 box-shadow: 0 0 10px #00f5a0; 

} 

 

/* ===== ICON ===== */ 

.icon-box { 

 width: 100px; 

 height: 100px; 

 margin: 25px auto; 

 
 background: rgba(255,255,255,0.1); 
 border-radius: 25px; 

 

 display: flex; 
 align-items: center; 

 justify-content: center; 

  font-size: 40px; 

 

 box-shadow: 0 0 20px rgba(0,245,160,0.3); 

} 

 

/* ===== TEXT ===== */ 

.heading { 
 text-align: center; 

 margin-bottom: 15px; 

font-size: 22px; 
} 
/* ===== BUTTON ===== */ 
.audio-btn { 
 display: block; 
 margin: 10px auto; 
 background: linear-gradient(45deg, #00f5a0, #00d9ff); 
 border: none; 
 padding: 10px 20px; 
 border-radius: 25px; 
 color: black; 
 font-weight: bold; 
 box-shadow: 0 0 15px #00f5a0; 
} 
/* ===== INPUT ===== */ 

.input-box { 
 margin: 20px 0; 
 padding: 15px; 
 border-radius: 30px; 
 display: flex; 
 gap: 10px; 
 align-items: center; 
 background: rgba(255,255,255,0.1); 
} 
 
.input-box input { 
 border: none; 
 background: transparent; 
 outline: none; 
 color: rgb(61, 48, 48); 
 width: 100%; 
} 
/* ===== OTP BUTTON ===== */ 

.otp-btn { 

 width: 100%;
 padding: 15px; 
 border-radius: 30px; 
 border: none; 
 background: linear-gradient(45deg, #00f5a0, #00d9ff); 
 color: black; 
 font-size: 18px; 
font-weight: bold; 
 box-shadow: 0 0 20px #00f5a0; 
 transition: 0.3s; 

} 
.otp-btn:hover { 

transform: scale(1.03); 

} 

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head> 
<body>

  <script>

let generatedOTP = "";
let savedNumber = "";

// SEND OTP
function sendOTP() {

  const mobilenumber =
    document.querySelector(".input-box input").value;

  // Validation
  if (mobilenumber.length !== 10 || isNaN(mobilenumber)) {
    showBox("❌ Enter valid 10 digit number");
    return;
  }

  savedNumber = mobilenumber;

  // OTP Generate
  generatedOTP =
    Math.floor(100000 + Math.random() * 900000).toString();

  // Show OTP Box
  document.getElementById("otpSection")
    .style.display = "block";

  // Demo OTP
  showBox(
`📲 OTP Sent Successfully

OTP:
${generatedOTP}`
  );
}

// VERIFY OTP
function verifyOTP() {

  const enteredOTP =
    document.getElementById("otpInput").value;

  // Check OTP
  if (enteredOTP === generatedOTP) {

    showBox(
`✅ Verification Successful

Mobile:
+91 ${savedNumber}`,
true
    );

  } else {

    showBox("❌ Incorrect OTP");
  }
}

// POPUP
function showBox(message, success = false) {

  const oldPopup =
    document.querySelector(".customPopup");

  if (oldPopup) {
    oldPopup.remove();
  }

  const popup =
    document.createElement("div");

  popup.className = "customPopup";

  popup.innerHTML = `
  <div style="
    position:fixed;
    top:20%;
    left:50%;
    transform:translate(-50%,-50%);
    width:320px;
    padding:25px;
    border-radius:30px;
    text-align:center;
    background:rgba(15,23,42,0.95);
    backdrop-filter:blur(20px);
    box-shadow:0 0 30px #00f5a0;
    z-index:9999;
    animation:zoom .4s ease;
  ">

    <h2 style="
      color:#00f5a0;
      margin-bottom:10px;
    ">
      Secure Access
    </h2>

    <p style="
      color:white;
      white-space:pre-line;
      line-height:1.8;
    ">
      ${message}
    </p>

    <button id="okBtn"
    style="
      margin-top:15px;
      border:none;
      padding:12px 25px;
      border-radius:25px;
      font-weight:bold;
      background:
      linear-gradient(45deg,#00f5a0,#00d9ff);
      cursor:pointer;
    ">
      OK
    </button>

  </div>
  `;

  document.body.appendChild(popup);

  // Button Action
  document.getElementById("okBtn")
    .onclick = function () {

      // Only success par page open hoga
      if (success) {
        window.location.href = "agrohelp.html";
      } else {
        popup.remove();
      }
    };
}

// Animation
const style =
document.createElement("style");

style.innerHTML = `
@keyframes zoom{
0%{
transform:
translate(-50%,-50%) scale(.5);
opacity:0;
}
100%{
transform:
translate(-50%,-50%) scale(1);
opacity:1;
}
}`;

document.head.appendChild(style);

</script>
