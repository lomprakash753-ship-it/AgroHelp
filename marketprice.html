<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Market Price</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#063b3b,#0c5b63,#123f6b);
    min-height:100vh;
    padding:20px;
    color:white;
}

.heading{
    text-align:center;
    margin-bottom:30px;
}

.heading h1{
    font-size:55px;
    font-weight:bold;
}

.heading p{
    color:#d8d8d8;
    margin-top:10px;
    font-size:18px;
}

.search-box{
    display:flex;
    gap:15px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.search-box input,
.search-box select{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    background:rgba(245, 238, 238, 0.1);
    color:rgb(51, 43, 43);
    font-size:16px;
    outline:none;
}

.search-box button{
    padding:15px 35px;
    border:none;
    border-radius:12px;
    background:#00ffe1;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 20px #00ffe1;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.stat-card{
    background:rgba(255,255,255,0.08);
    padding:25px;
    border-radius:18px;
    backdrop-filter:blur(10px);
}

.stat-card h2{
    font-size:20px;
    margin-bottom:10px;
}

.stat-card p{
    font-size:45px;
    font-weight:bold;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:25px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 15px #00f5a0;
    0 0 25px #00d9ff;
}
.card:active{
    transform: scale(0.98);
}

.card h2{
    font-size:35px;
    margin-bottom:15px;
}

.card p{
    font-size:20px;
    margin:8px 0;
}

.price{
    color:#00ff95;
    font-weight:bold;
}

.status{
    display:inline-block;
    padding:8px 15px;
    border-radius:20px;
    margin-top:10px;
    font-weight:bold;
}

.available{
    background:#00c853;
}

.buttons{
    display:flex;
    gap:15px;
    margin-top:20px;
}

.call-btn,
.hire-btn{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    color:white;
}

.call-btn{
    background:#00c853;
}

.hire-btn{
    background:#2962ff;
}

@media(max-width:768px){

    .heading h1{
        font-size:40px;
    }

    .container{
        grid-template-columns:1fr;
    }

}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}


#backBtn{
  background:rgba(255,255,255,0.1);
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
}

/* TOGGLE */
.lang-toggle{
  width:70px;
  height:35px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  padding:4px;
  position:relative;
  display:flex;
  align-items:center;
}

.circle{
  width:28px;
  height:28px;
  border-radius:50%;
  background:linear-gradient(45deg,#00f5a0,#00d9ff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  color:black;
  font-weight:bold;
  transition:0.3s;
}
buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
    flex-wrap:wrap;
}

.btn{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    color:white;
}

.view-btn{
    background:#00c853;
}

.detail-btn{
    background:#2962ff;
}

.sound-btn{
    background:#ff9800;
}


/* POPUP */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup-box{
    width:90%;
    max-width:400px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:30px;
    color:white;
    text-align:center;
    box-shadow:0 0 20px #00f5a0;
    animation:popupAnim 0.3s ease;
}

.popup-box h2{
    font-size:35px;
    margin-bottom:15px;
}

.popup-box p{
    font-size:20px;
    margin:10px 0;
}

.close-btn{
    float:right;
    font-size:22px;
    cursor:pointer;
    color:red;
}

@keyframes popupAnim{
    from{
        transform:scale(0.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.next-page-btn{
    padding:15px 30px;
    border:none;
    border-radius:12px;
    background:#ffcc00;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 15px #ffcc00;
    transition:0.3s;
}

.next-page-btn:hover{
    transform:scale(1.05);
}

</style>
</head>
<body>

    <!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">
    <span class="close-btn" onclick="closePopup()">✖</span>

    <h2 id="popupCrop">Crop Name</h2>

    <p><b>City :</b> <span id="popupCity"></span></p>

    <p><b>Mandi Rate :</b>
      <span id="popupPrice" class="price"></span>
    </p>

    <p><b>Status :</b>
      <span id="popupRate"></span>
    </p>

  </div>
</div>

<div class="top-bar">
  <div id="backBtn" onclick="window.location.href='agrohelp.html'">← पीछे</div>

  <div class="lang-toggle" onclick="toggleLanguage()">
    <div id="toggleCircle" class="circle">EN</div>
  </div>
</div>


<div class="heading">

    <div style="text-align:center; margin-bottom:20px;">
    
    <button onclick="openNextPage()" class="next-page-btn">
        Open Marketcrop price Page
    </button>

</div>

    <h1>Market Price</h1>

    <p>Find latest crop prices in Bhopal mandi</p>

</div>

<div class="search-box">

    <input type="text" placeholder="Search Crop...">

    <select>
        <option>All Crops</option>
        <option>Gehu</option>
        <option>Chana</option>
        <option>Masoor</option>
        <option>Sarso</option>
    </select>

    <select>
        <option>Select place</option>
        <option>Bhopal</option>
        <option>Indore</option>
        <option>Ujjain</option>
        <option>Udaipur</option>
        <option>hoshangawad</option>
        <option>raisen</option>
        <option>vidisha</option>
    </select>

    <button>Search</button>

</div>

<div class="stats">

    <div class="stat-card">
        <h2>Total Crops</h2>
        <p>10</p>
    </div>

    

    <div class="stat-card">
        <h2>Updated Time</h2>
        <p id="time">--</p>
    </div>

</div>

<div class="container" id="mandiContainer">

</div>

<script>

    let currentLang = "en";

const langData = {
  en:{
    title:"Labourers",
    search:"Search...",
    location:"Location",
    call:"Call",
    remove:"Remove",
    noLocation:"No location",
    available:"Available",
    busy:"Busy",
    back:"← Back"
  },
  hi:{
    title:"मजदूर",
    search:"खोजें...",
    location:"स्थान",
    call:"कॉल",
    remove:"हटाएं",
    noLocation:"कोई लोकेशन नहीं",
    available:"उपलब्ध",
    busy:"व्यस्त",
    back:"← पीछे"
  }
};

// 🔁 TOGGLE
function toggleLanguage(){
  currentLang = currentLang === "en" ? "hi" : "en";

  const circle = document.getElementById("toggleCircle");

  if(currentLang==="hi"){
    circle.style.transform="translateX(30px)";
    circle.innerText="हिं";
  }else{
    circle.style.transform="translateX(0)";
    circle.innerText="EN";
  }

  applyLanguage();
}

// 🔄 APPLY
function applyLanguage(){
  document.querySelector("h2").innerText = langData[currentLang].title;
  document.querySelector(".search").placeholder = langData[currentLang].search;
  document.getElementById("backBtn").innerText = langData[currentLang].back;

  loadLabours();
}


const mandiData = [

{
    crop:"🌾 गेहूं",
    price:"₹2268 - ₹2460",
    city:"Bhopal",
    rate:"High"
},

{
    crop:"🟤 चना",
    price:"₹3811 - ₹5330",
    city:"Bhopal",
    rate:"Medium"
},

{
    crop:"🌱 तिवड़ा",
    price:"₹2850 - ₹3019",
    city:"Bhopal",
    rate:"Normal"
},

{
    crop:"🟡 तुअर",
    price:"₹6200 - ₹6980",
    city:"Bhopal",
    rate:"High"
},

{
    crop:"🟠 मसूर",
    price:"₹5805 - ₹5805",
    city:"Bhopal",
    rate:"Normal"
},

{
    crop:"🌽 मक्का",
    price:"₹1800 - ₹2200",
    city:"Bhopal",
    rate:"Medium"
},

{
    crop:"🟡 सरसों",
    price:"₹5000 - ₹5900",
    city:"Bhopal",
    rate:"High"
},

{
    crop:"🍚 धान",
    price:"₹2100 - ₹2600",
    city:"Bhopal",
    rate:"Normal"
},

{
    crop:"🥜 मूंगफली",
    price:"₹4500 - ₹6200",
    city:"Bhopal",
    rate:"High"
},

{
    crop:"🌿 सोयाबीन",
    price:"₹3900 - ₹4700",
    city:"Bhopal",
    rate:"Medium"
}

];

const container = document.getElementById("mandiContainer");

mandiData.forEach(item => {

container.innerHTML += `

<div class="card">

    <h2>${item.crop}</h2>

    
    

    <div class="buttons">

        <button class="call-btn"
onclick="openPopup(
'${item.crop}',
'${item.city}',
'${item.price}',
'${item.rate}'
)">
    View
</button>

                <button class="btn sound-btn"
        onclick="playSound('${item.crop}','${item.price}')">

            🔊 Sound

        </button>


    </div>

</div>

`;

});

const now = new Date();

document.getElementById("time").innerHTML =
now.getHours() + ":" + now.getMinutes();


function playSound(crop, price){

    let speech = new SpeechSynthesisUtterance();

    speech.text =
    crop + " का मंडी भाव " + price;

    speech.lang = "hi-IN";

    speech.volume = 1;

    speech.rate = 1;

    speech.pitch = 1;

    window.speechSynthesis.speak(speech);

}

// OPEN POPUP
function openPopup(crop, city, price, rate){

    document.getElementById("popupCrop").innerText = crop;
    document.getElementById("popupCity").innerText = city;
    document.getElementById("popupPrice").innerText = price;
    document.getElementById("popupRate").innerText = rate;

    document.getElementById("popup").style.display = "flex";
}

// CLOSE POPUP
function closePopup(){
    document.getElementById("popup").style.display = "none";
}


function openNextPage(){

    window.location.href = "marketpricevegitable.html";

}
</script>

</body>
</html>
